<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doc's Edit</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            /* Cores Escuras e Profundas com Glow Esmeralda */
            --bg-primary: #05080c;
            --bg-gradient: radial-gradient(circle at 50% 50%, #0d161f 0%, #05080c 100%);
            --bg-secondary: rgba(17, 24, 35, 0.6);
            --bg-card: rgba(27, 36, 49, 0.45);
            --accent: #10b981; /* Verde Esmeralda */
            --accent-glow: rgba(16, 185, 129, 0.25);
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --border-color: rgba(45, 55, 72, 0.5);
            
            --status-todo: #ef4444;
            --status-progress: #3b82f6;
            --status-done: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            background-attachment: fixed;
        }

        /* Header Premium com Blur de Vidro */
        header {
            background-color: rgba(17, 24, 35, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 20px 40px;
            display: flex;
            justify-content: flex-start; /* Alinhado à esquerda agora que não tem o botão */
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            z-index: 10;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-area i {
            color: var(--accent);
            font-size: 26px;
            filter: drop-shadow(0 0 12px var(--accent-glow));
        }

        .logo-area h1 {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 0.8px;
            background: linear-gradient(135deg, #fff 30%, #a7f3d0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Workspace Principal */
        main {
            flex: 1;
            padding: 40px;
            display: flex;
            gap: 30px;
            overflow-x: auto;
            align-items: flex-start;
        }

        /* Colunas Estilo Vidro (Glassmorphism) */
        .column {
            background-color: var(--bg-secondary);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            flex: 1;
            min-width: 320px;
            max-width: 400px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            display: flex;
            flex-direction: column;
            max-height: calc(100vh - 180px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            transition: border-color 0.3s;
        }

        .column:hover {
            border-color: rgba(255, 255, 255, 0.08);
        }

        .column-header {
            padding: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .column-title {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .column-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            box-shadow: 0 0 10px currentColor;
        }

        .todo { color: #f87171; }
        .progress { color: #60a5fa; }
        .done { color: #34d399; }

        .todo .column-dot { background-color: var(--status-todo); color: var(--status-todo); }
        .progress .column-dot { background-color: var(--status-progress); color: var(--status-progress); }
        .done .column-dot { background-color: var(--status-done); color: var(--status-done); }

        .card-count {
            background-color: rgba(255, 255, 255, 0.05);
            color: var(--text-muted);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .card-list {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            overflow-y: auto;
            flex: 1;
            min-height: 200px;
        }

        /* Cards Translúcidos com Neon Borders */
        .card {
            background-color: var(--bg-card);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px;
            cursor: grab;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
        }

        .card:hover {
            border-color: rgba(16, 185, 129, 0.4);
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.4), 0 0 15px rgba(16, 185, 129, 0.1);
        }

        .card:active {
            cursor: grabbing;
        }

        .card-title {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 10px;
            color: var(--text-main);
            letter-spacing: 0.3px;
        }

        .card-desc {
            font-size: 13.5px;
            color: var(--text-muted);
            margin-bottom: 16px;
            line-height: 1.5;
            white-space: pre-wrap;
        }

        .card-links {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 16px;
        }

        .link-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background-color: rgba(255, 255, 255, 0.03);
            padding: 10px 16px;
            border-radius: 8px;
            font-size: 12.5px;
            font-weight: 600;
            text-decoration: none;
            color: var(--text-main);
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.25s ease;
        }

        .link-badge:hover {
            background-color: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.15);
            transform: translateY(-1px);
        }

        .link-badge.drive i {
            color: #ffc107;
            filter: drop-shadow(0 0 5px rgba(255, 193, 7, 0.3));
        }

        .link-badge.final {
            border-color: rgba(16, 185, 129, 0.2);
            background-color: rgba(16, 185, 129, 0.05);
        }

        .link-badge.final:hover {
            background-color: rgba(16, 185, 129, 0.1);
            border-color: rgba(16, 185, 129, 0.4);
        }

        .link-badge.final i {
            color: var(--accent);
            filter: drop-shadow(0 0 5px rgba(16, 185, 129, 0.4));
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
            color: var(--text-muted);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 12px;
        }

        .card-actions {
            display: flex;
            gap: 10px;
        }

        .btn-action {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s ease;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-action:hover {
            background-color: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
        }

        .btn-action.delete:hover {
            background-color: rgba(239, 68, 110, 0.1);
            color: var(--status-todo);
        }

        /* Modal Ultra Moderno */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(3, 5, 8, 0.85);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 1000;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal {
            background-color: #0f172a;
            border: 1px solid rgba(255, 255, 255, 0.08);
            width: 100%;
            max-width: 500px;
            border-radius: 16px;
            padding: 35px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            transform: scale(0.95);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .modal-overlay.active .modal {
            transform: scale(1);
        }

        .modal-title {
            font-size: 20px;
            margin-bottom: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #fff 0%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .form-group {
            margin-bottom: 22px;
        }

        .form-group label {
            display: block;
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: 8px;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 0.8px;
        }

        .form-group input, .form-group textarea {
            width: 100%;
            background-color: rgba(5, 8, 12, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            padding: 14px;
            color: var(--text-main);
            font-size: 14px;
            outline: none;
            transition: all 0.25s ease;
        }

        .form-group input:focus, .form-group textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 10px rgba(16, 185, 129, 0.15);
            background-color: rgba(5, 8, 12, 0.8);
        }

        .modal-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 14px;
            margin-top: 35px;
        }

        .btn-cancel {
            background: none;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-main);
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        .btn-cancel:hover {
            background-color: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .btn-submit {
            background-color: var(--accent);
            color: #05080c;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.2s;
        }

        .btn-submit:hover {
            background-color: #34d399;
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.3);
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-area">
            <i class="fa-solid fa-clapperboard"></i>
            <h1>Doc's Edit</h1>
        </div>
    </header>

    <main>
        <!-- A FAZER -->
        <div class="column todo">
            <div class="column-header">
                <div class="column-title">
                    <div class="column-dot"></div>
                    A Fazer
                </div>
                <span class="card-count" id="count-todo">0</span>
            </div>
            <div class="card-list" id="list-todo" ondragover="allowDrop(event)" ondrop="drop(event, 'todo')">
                <!-- Cards dinâmicos entram aqui -->
            </div>
        </div>

        <!-- EM EDIÇÃO -->
        <div class="column progress">
            <div class="column-header">
                <div class="column-title">
                    <div class="column-dot"></div>
                    Em Edição
                </div>
                <span class="card-count" id="count-progress">0</span>
            </div>
            <div class="card-list" id="list-progress" ondragover="allowDrop(event)" ondrop="drop(event, 'progress')">
                <!-- Cards dinâmicos entram aqui -->
            </div>
        </div>

        <!-- CONCLUÍDO -->
        <div class="column done">
            <div class="column-header">
                <div class="column-title">
                    <div class="column-dot"></div>
                    Concluído
                </div>
                <span class="card-count" id="count-done">0</span>
            </div>
            <div class="card-list" id="list-done" ondragover="allowDrop(event)" ondrop="drop(event, 'done')">
                <!-- Cards dinâmicos entram aqui -->
            </div>
        </div>
    </main>

    <!-- Modal Editar Vídeo (Fica aqui para a edição dos cards criados automaticamente) -->
    <div class="modal-overlay" id="video-modal">
        <div class="modal">
            <h2 class="modal-title" id="modal-title-text">Editar Vídeo</h2>
            <form id="video-form" onsubmit="handleFormSubmit(event)">
                <input type="hidden" id="video-id">
                <div class="form-group">
                    <label for="video-name">Título do Vídeo</label>
                    <input type="text" id="video-name" placeholder="Ex: Gameplay DBD - Huntress" required>
                </div>
                <div class="form-group">
                    <label for="video-drive">Link do Vídeo Bruto (Drive)</label>
                    <input type="url" id="video-drive" placeholder="https://drive.google.com/..." required>
                </div>
                <div class="form-group">
                    <label for="video-desc">Instruções de Edição</label>
                    <textarea id="video-desc" rows="4" placeholder="Cortes aos 01:15, adicionar zoom, reações..." required></textarea>
                </div>
                <div class="form-group" id="final-link-group" style="display: none;">
                    <label for="video-final">Link do Vídeo Finalizado</label>
                    <input type="url" id="video-final" placeholder="https://drive.google.com/...">
                </div>
                <div class="modal-buttons">
                    <button type="button" class="btn-cancel" onclick="closeModal()">Cancelar</button>
                    <button type="submit" class="btn-submit" id="btn-submit-text">Salvar Alterações</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Firebase SDKs (Versão Compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script>
        // Suas chaves de configuração do Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyDEejQS_JQMsd7D3-hXsC30UmYH1mJcHcw",
            authDomain: "doc-editor-c5af8.firebaseapp.com",
            projectId: "doc-editor-c5af8",
            storageBucket: "doc-editor-c5af8.firebasestorage.app",
            messagingSenderId: "340152893660",
            appId: "1:340152893660:web:794918522fff617c34b419",
            measurementId: "G-6G2W3C86XS"
        };

        // Inicializa o Firebase e o Firestore
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Armazenamento local dos cards
        let videosArray = [];
        let currentDragId = null;

        // Escutar alterações do Firestore em tempo real
        db.collection("videos").orderBy("createdAt", "desc").onSnapshot((snapshot) => {
            videosArray = [];
            snapshot.forEach((doc) => {
                videosArray.push({ id: doc.id, ...doc.data() });
            });
            renderBoard();
        });

        // Renderizar elementos na tela
        function renderBoard() {
            const columns = {
                todo: document.getElementById('list-todo'),
                progress: document.getElementById('list-progress'),
                done: document.getElementById('list-done')
            };

            // Limpa as colunas
            Object.values(columns).forEach(col => col.innerHTML = '');

            const counts = { todo: 0, progress: 0, done: 0 };

            videosArray.forEach(video => {
                counts[video.status]++;

                const cardHTML = `
                    <div class="card" draggable="true" ondragstart="dragStart('${video.id}')" id="card-${video.id}">
                        <h3 class="card-title">${video.title}</h3>
                        <p class="card-desc">${video.desc}</p>
                        <div class="card-links">
                            <a href="${video.driveUrl}" target="_blank" class="link-badge drive">
                                <i class="fa-brands fa-google-drive"></i> Baixar Bruto
                            </a>
                            ${video.finalUrl ? `
                                <a href="${video.finalUrl}" target="_blank" class="link-badge final">
                                    <i class="fa-solid fa-circle-check"></i> Vídeo Pronto
                                </a>
                            ` : ''}
                        </div>
                        <div class="card-footer">
                            <span>Adicionado: ${new Date(video.createdAt).toLocaleDateString()}</span>
                            <div class="card-actions">
                                <button class="btn-action edit" onclick="openModal('edit', '${video.id}')">
                                    <i class="fa-solid fa-pen"></i>
                                </button>
                                <button class="btn-action delete" onclick="deleteVideo('${video.id}')">
                                    <i class="fa-solid fa-trash"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                `;

                columns[video.status].insertAdjacentHTML('beforeend', cardHTML);
            });

            // Atualiza contadores
            document.getElementById('count-todo').textContent = counts.todo;
            document.getElementById('count-progress').textContent = counts.progress;
            document.getElementById('count-done').textContent = counts.done;
        }

        // Funções de Drag & Drop
        function dragStart(id) {
            currentDragId = id;
        }

        function allowDrop(ev) {
            ev.preventDefault();
        }

        function drop(ev, newStatus) {
            ev.preventDefault();
            if (currentDragId) {
                db.collection("videos").doc(currentDragId).update({
                    status: newStatus
                }).catch(err => console.error("Erro ao mover card:", err));
                currentDragId = null;
            }
        }

        // Modais e Formulários
        const modal = document.getElementById('video-modal');

        function openModal(mode, id = null) {
            modal.classList.add('active');
            if (mode === 'edit') {
                document.getElementById('modal-title-text').textContent = 'Editar Vídeo';
                document.getElementById('final-link-group').style.display = 'block';

                const video = videosArray.find(v => v.id === id);
                if (video) {
                    document.getElementById('video-id').value = video.id;
                    document.getElementById('video-name').value = video.title;
                    document.getElementById('video-drive').value = video.driveUrl;
                    document.getElementById('video-desc').value = video.desc;
                    document.getElementById('video-final').value = video.finalUrl || '';
                }
            }
        }

        // Fechar modal
        function closeModal() {
            modal.classList.remove('active');
        }

        // Salvar alterações
        function handleFormSubmit(e) {
            e.preventDefault();
            const id = document.getElementById('video-id').value;
            const title = document.getElementById('video-name').value;
            const driveUrl = document.getElementById('video-drive').value;
            const desc = document.getElementById('video-desc').value;
            const finalUrl = document.getElementById('video-final').value;

            if (id) {
                db.collection("videos").doc(id).update({
                    title,
                    driveUrl,
                    desc,
                    finalUrl: finalUrl || null
                }).then(() => {
                    closeModal();
                });
            }
        }

        // Deletar vídeo
        function deleteVideo(id) {
            if (confirm("Quer mesmo apagar esse projeto do painel?")) {
                db.collection("videos").doc(id).delete();
            }
        }
    </script>
</body>
</html>
